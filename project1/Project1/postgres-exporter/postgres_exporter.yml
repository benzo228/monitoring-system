# postgres-exporter/postgres_exporter.yml
auto_discover_databases: true
exclude_databases:
  - template0
  - template1

queries:
  - name: slow_queries
    help: "Slow queries count"
    query: |
      SELECT count(*) as slow_count 
      FROM pg_stat_activity 
      WHERE state = 'active' 
      AND now() - query_start > interval '5 minutes'
    metrics:
      - slow_count:
          usage: "GAUGE"
          description: "Number of slow queries"